<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoonBit xterm browser POC</title>
    <style>
      :root {
        color-scheme: dark;
        background: #17191c;
        color: #e5e1d8;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 22rem),
          #17191c;
      }

      main {
        width: min(760px, calc(100vw - 32px));
      }

      .terminal-frame {
        border: 1px solid #3f4650;
        background: #0f1115;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      }

      .mb-xterm {
        position: relative;
        padding: 18px;
        min-height: 22rem;
        outline: none;
        color: #e5e1d8;
        background: #0f1115;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 14px;
        line-height: 1.45;
        cursor: text;
        user-select: text;
      }

      .mb-xterm-focused {
        box-shadow: inset 0 0 0 1px #68b7ff;
      }

      .mb-xterm-screen {
        white-space: pre;
        overflow: hidden;
      }

      .mb-xterm-row {
        height: 1.45em;
      }

      .mb-xterm-cell {
        display: inline-block;
        width: 1ch;
        height: 1.45em;
      }

      .mb-xterm-cell-wide {
        width: 2ch;
      }

      .mb-xterm-cell-zero-width {
        width: 0;
        overflow: hidden;
      }

      .mb-xterm-cell-cursor {
        color: #0f1115;
        background: #e5e1d8;
      }

      .mb-xterm-input {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 1px;
        height: 1px;
        border: 0;
        padding: 0;
        opacity: 0;
        resize: none;
        outline: none;
        background: transparent;
        color: transparent;
      }

      @keyframes mb-xterm-blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="terminal" class="terminal-frame"></div>
    </main>
    <script type="module" src="../../_build/js/debug/build/examples/browser/browser.js"></script>
  </body>
</html>
